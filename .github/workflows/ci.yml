name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build blocks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check version consistency
        run: bash bin/check-version.sh

      - run: npm ci
      - run: npm run build
      - run: npm run lint:js

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          if-no-files-found: error

      - name: Package installable plugin ZIP
        run: bash bin/build-zip.sh

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: terraviz-plugin-zip
          path: dist/terraviz-*.zip
          if-no-files-found: error

  lint-php:
    name: PHP coding standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer, cs2pr
          coverage: none

      - run: composer install --prefer-dist --no-progress

      - name: PHPCS
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr --graceful-warnings

  test:
    name: PHPUnit (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '7.4'
            wp: 'latest'
          - php: '8.2'
            wp: 'latest'

    services:
      mysql:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli
          tools: composer
          coverage: none

      - name: Download built blocks
        uses: actions/download-artifact@v4
        with:
          name: build
          path: build/

      - run: composer install --prefer-dist --no-progress

      - name: Install Subversion (needed by install-wp-tests.sh)
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }}

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit

      - name: Run public-API smoke test
        run: vendor/bin/phpunit --testsuite smoke
