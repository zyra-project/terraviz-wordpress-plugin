name: Screenshots

# Capture screenshots of every block (front end) and the wp-admin dashboard
# views by driving a real WordPress (wp-env) with Playwright. Two products:
#
#   - a downloadable gallery artifact ("here's how everything looks");
#   - visual-regression: `toHaveScreenshot` diffs each shot against a committed
#     baseline (tests/e2e/__snapshots__/) and fails on an unexpected change.
#
# A subset is also written with the canonical WordPress.org listing names
# (.wordpress-org/screenshot-N.png), ready for a future WP.org SVN asset deploy.
#
# Kept OUT of the core ci.yml gate (its own workflow) so a screenshot flake
# never blocks a merge.
#
# Updating baselines: the capture job is read-only — it runs untrusted PR code,
# so its token can never write, and a protected default branch can't be pushed to
# directly anyway. To (re)generate baselines, run the workflow manually with
# `update_baselines = true`. A separate, write-scoped `open-baseline-pr` job
# (gated to workflow_dispatch, so it never runs against PR code) then commits the
# regenerated baselines and opens a PR for you; it also uploads a
# `refreshed-baselines` artifact if you'd rather commit them by hand. Day to day,
# regenerate on your feature branch with `npm run screenshots:update` and commit
# the diff alongside the UI change, so the PR's own Screenshots run validates it.
# See tests/e2e/README.md.

on:
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Regenerate baselines + WordPress.org listing images, then open a PR with them automatically (also uploaded as a refreshed-baselines artifact)'
        type: boolean
        default: false
  pull_request:
    paths:
      - 'blocks/**'
      - 'src/**'
      - 'assets/**'
      - 'tests/e2e/**'
      - 'playwright.config.js'
      - '.github/workflows/screenshots.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capture:
    name: Capture block & dashboard screenshots
    runs-on: ubuntu-latest
    # Read-only: this job runs untrusted PR code, so the token can never write.
    permissions:
      contents: read
    steps:
      # Default ref: the PR merge ref for pull_request (works for forks), and the
      # selected branch for workflow_dispatch.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The PHP blocks register from build/; the dashboard app is built here too.
      - run: npm run build

      # `playwright install --with-deps` fetches Chromium plus a set of font
      # packages from the Ubuntu mirror via apt, which intermittently stalls
      # mid-download and hangs the step until the 6-hour job limit. Give apt a
      # per-download socket timeout + retries so a stalled fetch aborts and is
      # re-tried (instead of hanging), and wrap the whole install in an outer
      # retry as a backstop. `timeout-minutes` is the final guard.
      - name: Install Playwright Chromium
        timeout-minutes: 15
        run: |
          printf 'Acquire::Retries "5";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\n' \
            | sudo tee /etc/apt/apt.conf.d/99timeout-retry >/dev/null
          for attempt in 1 2 3; do
            echo "Playwright install attempt ${attempt}/3"
            if npx playwright install --with-deps chromium; then
              exit 0
            fi
            echo "::warning::Playwright install attempt ${attempt} failed; retrying in 15s"
            sleep 15
          done
          echo "::error::Playwright install failed after 3 attempts"
          exit 1

      - name: Enable offline E2E fixtures for wp-env
        run: |
          cat > .wp-env.override.json <<'JSON'
          {
            "mappings": {
              "wp-content/mu-plugins": "./tests/e2e/mu-plugins"
            },
            "config": {
              "TERRAVIZ_E2E": true
            }
          }
          JSON

      - name: Start WordPress (wp-env)
        run: npx wp-env start --update

      - name: Capture screenshots
        run: |
          if [ "${{ github.event.inputs.update_baselines }}" = "true" ]; then
            npm run screenshots:update
          else
            npm run screenshots
          fi

      # Diff the fresh actuals against the committed baselines and render the PR
      # comment body. Runs even when the capture step failed the gate (snap()
      # writes the gallery actual before asserting), and its own failure never
      # reds the run. Writes .diff.png overlays into the gallery *before* it is
      # uploaded, plus visual-report.{md,json}.
      - name: Generate visual report
        if: ${{ always() && github.event.inputs.update_baselines != 'true' }}
        continue-on-error: true
        run: npm run visual-report

      # Stash the PR number so the write-scoped workflow_run job knows where to
      # post (workflow_run.pull_requests is unreliable for forks).
      - name: Record PR number
        if: ${{ always() && github.event_name == 'pull_request' }}
        run: |
          mkdir -p tests/e2e/.artifacts
          echo "${{ github.event.pull_request.number }}" > tests/e2e/.artifacts/pr.txt

      # The comment body + metrics, consumed by screenshots-comment.yml. Carries
      # no code — just the Markdown, the JSON metrics, and the PR number.
      - name: Upload visual report
        if: ${{ always() && github.event.inputs.update_baselines != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: |
            tests/e2e/.artifacts/visual-report.md
            tests/e2e/.artifacts/visual-report.json
            tests/e2e/.artifacts/pr.txt
          if-no-files-found: warn

      - name: Upload screenshot gallery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-gallery
          path: |
            tests/e2e/.artifacts/gallery/**
            .wordpress-org/screenshot-*.png
          # The output dirs are dot-prefixed; include them explicitly.
          include-hidden-files: true
          if-no-files-found: warn

      - name: Upload Playwright report (diffs on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/.artifacts/report/**
          include-hidden-files: true
          if-no-files-found: warn

      # On a baseline refresh, also publish the regenerated baselines + listing
      # images as an artifact — consumed by the open-baseline-pr job below, and a
      # manual fallback if you'd rather commit them by hand.
      - name: Upload refreshed baselines
        if: ${{ github.event.inputs.update_baselines == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-baselines
          path: |
            tests/e2e/__snapshots__/**
            .wordpress-org/screenshot-*.png
          include-hidden-files: true
          if-no-files-found: warn

      - name: Stop WordPress (wp-env)
        if: always()
        run: npx wp-env stop

  # Commit the regenerated baselines and open a PR — one-click refresh instead of
  # downloading the artifact by hand. Deliberately a SEPARATE job so the write
  # token is isolated from the capture job, and gated to `workflow_dispatch` (a
  # manual trigger, only available to users with repo write access) so the
  # untrusted `pull_request` path never reaches it — the capture job stays
  # `contents: read`.
  open-baseline-pr:
    name: Open baseline-refresh PR
    needs: capture
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.update_baselines == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the baseline branch
      pull-requests: write # open the PR
      actions: read # download the run's artifact
    steps:
      - uses: actions/checkout@v4

      # The baselines the capture job just regenerated (paths preserved:
      # tests/e2e/__snapshots__/** and .wordpress-org/screenshot-*.png).
      - name: Download regenerated baselines
        uses: actions/download-artifact@v4
        with:
          name: refreshed-baselines

      - name: Commit baselines and open a PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Stage first so new (untracked) mobile baselines count, then bail if
          # the render already matches what's committed.
          git add tests/e2e/__snapshots__ .wordpress-org
          if git diff --cached --quiet; then
            echo "Baselines already match the current render; nothing to open."
            exit 0
          fi

          branch="chore/refresh-screenshot-baselines-${GITHUB_RUN_ID}"
          git switch -c "$branch"
          # -s for the DCO gate; identity matches the sign-off.
          git commit -s \
            -m 'test(e2e): refresh screenshot baselines' \
            -m "Regenerated by the Screenshots workflow (update_baselines dispatch, run ${GITHUB_RUN_ID})."
          git push origin "$branch"

          cat > "${RUNNER_TEMP}/pr-body.md" <<'EOF'
          Automated baseline refresh from the **Screenshots** workflow (`update_baselines` dispatch).

          These PNGs were captured and written by that same run, so they already reflect the current CI-Linux rendering — review the image diff and merge.

          _Opened by `GITHUB_TOKEN`, so required status checks may not run automatically on this PR (GitHub loop-prevention). Push an empty commit or re-run them if branch protection requires them._
          EOF

          # Opening the PR needs "Allow GitHub Actions to create and approve pull
          # requests" (Settings → Actions → General). If that's off, gh fails —
          # the branch is already pushed, so fall back to printing the compare
          # link instead of failing the job.
          if gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "$branch" \
            --title "Refresh screenshot baselines (run ${GITHUB_RUN_ID})" \
            --body-file "${RUNNER_TEMP}/pr-body.md"; then
            echo "Opened a baseline-refresh PR."
          else
            echo "::warning::Pushed ${branch}, but could not open the PR automatically. Enable 'Allow GitHub Actions to create and approve pull requests' (Settings → Actions → General) for one-click PRs."
            echo "Open one here: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${GITHUB_REF_NAME}...${branch}?expand=1"
          fi
