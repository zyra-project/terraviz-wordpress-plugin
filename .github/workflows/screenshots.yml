name: Screenshots

# Capture screenshots of every block (front end) and the wp-admin dashboard
# views by driving a real WordPress (wp-env) with Playwright. Two products:
#
#   - a downloadable gallery artifact ("here's how everything looks");
#   - visual-regression: `toHaveScreenshot` diffs each shot against a committed
#     baseline (tests/e2e/__snapshots__/) and fails on an unexpected change.
#
# A subset is also written with the canonical WordPress.org listing names
# (.wordpress-org/screenshot-N.png), ready for a future WP.org SVN asset deploy.
#
# Kept OUT of the core ci.yml gate (its own workflow) so a screenshot flake
# never blocks a merge.
#
# Updating baselines: this workflow never writes to the repo (it is read-only —
# a protected default branch can't be pushed to directly anyway, and the job
# runs untrusted PR code). To (re)generate baselines, run it manually with
# `update_baselines = true`; it uploads a `refreshed-baselines` artifact
# (tests/e2e/__snapshots__/ + .wordpress-org/screenshot-N.png) that you commit
# via a PR. Day to day, regenerate on your feature branch with
# `npm run screenshots:update` and commit the diff alongside the UI change, so
# the PR's own Screenshots run validates it. See tests/e2e/README.md.

on:
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Regenerate baselines + WordPress.org listing images and upload them as a refreshed-baselines artifact to commit via a PR'
        type: boolean
        default: false
  pull_request:
    paths:
      - 'blocks/**'
      - 'src/**'
      - 'assets/**'
      - 'tests/e2e/**'
      - 'playwright.config.js'
      - '.github/workflows/screenshots.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  capture:
    name: Capture block & dashboard screenshots
    runs-on: ubuntu-latest
    # Read-only: this job runs untrusted PR code, so the token can never write.
    permissions:
      contents: read
    steps:
      # Default ref: the PR merge ref for pull_request (works for forks), and the
      # selected branch for workflow_dispatch.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The PHP blocks register from build/; the dashboard app is built here too.
      - run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Enable offline E2E fixtures for wp-env
        run: |
          cat > .wp-env.override.json <<'JSON'
          {
            "mappings": {
              "wp-content/mu-plugins": "./tests/e2e/mu-plugins"
            },
            "config": {
              "TERRAVIZ_E2E": true
            }
          }
          JSON

      - name: Start WordPress (wp-env)
        run: npx wp-env start --update

      - name: Capture screenshots
        run: |
          if [ "${{ github.event.inputs.update_baselines }}" = "true" ]; then
            npm run screenshots:update
          else
            npm run screenshots
          fi

      - name: Upload screenshot gallery
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-gallery
          path: |
            tests/e2e/.artifacts/gallery/**
            .wordpress-org/screenshot-*.png
          # The output dirs are dot-prefixed; include them explicitly.
          include-hidden-files: true
          if-no-files-found: warn

      - name: Upload Playwright report (diffs on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/.artifacts/report/**
          include-hidden-files: true
          if-no-files-found: warn

      # On a baseline refresh, publish the regenerated baselines + listing images
      # as an artifact to download and commit via a PR (this workflow never
      # writes to the repo itself — see the header note).
      - name: Upload refreshed baselines
        if: ${{ github.event.inputs.update_baselines == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-baselines
          path: |
            tests/e2e/__snapshots__/**
            .wordpress-org/screenshot-*.png
          include-hidden-files: true
          if-no-files-found: warn

      - name: Stop WordPress (wp-env)
        if: always()
        run: npx wp-env stop
